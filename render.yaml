services:
  - type: web
    name: vexa-platform
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node .output/server/index.mjs
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
    staticPublishPath: .output/public
    healthCheckPath: /
